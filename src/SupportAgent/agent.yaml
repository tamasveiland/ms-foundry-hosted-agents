kind: hosted
name: supportagent
protocols:
    - protocol: responses
      version: v1
environment_variables:
    - name: AZURE_OPENAI_ENDPOINT
      value: ${AZURE_OPENAI_ENDPOINT}
    - name: AZURE_AI_PROJECT_ENDPOINT
      value: ${AZURE_AI_PROJECT_ENDPOINT}
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
    - name: APPROVAL_SERVICE_URL
      value: ${APPROVAL_SERVICE_URL}
    - name: APPROVAL_SERVICE_API_KEY
      value: ${APPROVAL_SERVICE_API_KEY}
    - name: APPROVAL_TIMEOUT_SECONDS
      value: ${APPROVAL_TIMEOUT_SECONDS}
    - name: APPROVAL_FAIL_MODE
      value: ${APPROVAL_FAIL_MODE}
